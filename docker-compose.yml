services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ../backend:/app

  frontend:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - backend
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: ../backend
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - backend
    volumes:
      - ../backend:/app

  celery_beat:
    build: ../backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - backend
    volumes:
      - ../backend:/app
